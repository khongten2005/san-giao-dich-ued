<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sàn Giao Dịch UED (V1)</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; display: flex; justify-content: center;}
        .container { width: 100%; max-width: 1000px; background: #1e1e1e; padding: 20px; border-radius: 10px;}
        .header { text-align: center; color: #facc15; }
        .main-layout { display: flex; gap: 20px; margin-top: 20px;}
        .left-col { flex: 2; }
        .right-col { flex: 1; background: #2a2a2a; padding: 20px; border-radius: 10px;}
        #chart-container { width: 100%; height: 400px; margin-top: 10px; border: 1px solid #444; }
        .price { font-size: 30px; font-weight: bold; text-align: center;}
        .up { color: #10b981; } .down { color: #ef4444; }
        .btn-buy { background: #10b981; color: white; border: none; padding: 10px; width: 48%; cursor: pointer; font-weight: bold; border-radius: 5px;}
        .btn-sell { background: #ef4444; color: white; border: none; padding: 10px; width: 48%; cursor: pointer; font-weight: bold; border-radius: 5px;}
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #ccc;}
        .input-group input, .input-group select { width: 100%; padding: 8px; box-sizing: border-box; background: #333; color: white; border: 1px solid #555;}
        .server-info { margin-top: 20px; text-align: center; color: #888; font-size: 14px;}
        .pos-item { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 14px; border-left: 4px solid gray;}
        .pos-item.long { border-left-color: #10b981;}
        .pos-item.short { border-left-color: #ef4444;}
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header">📊 SÀN GIAO DỊCH UED (Bản V1)</h1>
        <div class="main-layout">
            <div class="left-col">
                <div class="price" id="priceDisplay">Đang tải...</div>
                <div id="chart-container"></div>
            </div>
            <div class="right-col">
                <h3 style="text-align: center;">Tài khoản: <span id="balanceDisplay" style="color: #facc15;">$10,000.00</span></h3>
                <div class="input-group">
                    <label>Tiền Cọc (USD):</label>
                    <input type="number" id="tradeMargin" value="100">
                </div>
                <div class="input-group">
                    <label>Đòn bẩy:</label>
                    <select id="tradeLeverage">
                        <option value="1">1x</option>
                        <option value="10">10x</option>
                        <option value="50" selected>50x</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <button class="btn-buy" onclick="executeTrade('LONG')">MUA (LONG)</button>
                    <button class="btn-sell" onclick="executeTrade('SHORT')">BÁN (SHORT)</button>
                </div>
                <h4 style="margin-top: 20px; border-bottom: 1px solid #444; padding-bottom: 5px;">Lệnh đang mở:</h4>
                <div id="positionsList">Chưa có lệnh nào</div>
            </div>
        </div>
        <div class="server-info">Load Balancer Nginx: <span id="serverName" style="color:#facc15;">Đang kết nối...</span></div>
    </div>
    <script src="/main.js"></script>
</body>
</html>
