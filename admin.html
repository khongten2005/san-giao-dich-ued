<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Trị Hệ Thống - UED</title>
    <style>
        /* Mặc định ẩn toàn bộ nội dung để bảo mật */
        #adminContent { display: none; }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: white; margin: 0; padding: 30px; }
        .container { background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; text-align: center; margin: 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background-color: #0f172a; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        tr:hover { background-color: #334155; }
        
        .up { color: #10b981; font-weight: bold;}
        .down { color: #ef4444; font-weight: bold;}
        .badge { background: #38bdf8; color: #0f172a; padding: 3px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        
        .btn-home { display: inline-block; background: #334155; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; transition: 0.3s;}
        .btn-home:hover { background: #475569; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <script>
        const pass = prompt("⛔ KHU VỰC TUYỆT MẬT. Vui lòng nhập mật mã quản trị:");
        if (pass === "admin123") {
            // Nếu đúng pass, đợi HTML load xong rồi mới hiện nội dung và kéo data
            window.addEventListener('DOMContentLoaded', () => {
                document.getElementById('adminContent').style.display = 'block';
                loadAdminData();
            });
        } else {
            // Nếu sai, xóa trắng body và hiện thông báo đuổi khách
            document.body.innerHTML = "<div style='text-align:center; margin-top:100px;'><h1 style='color:#ef4444;'>❌ TRUY CẬP BỊ TỪ CHỐI!</h1><p>Mật mã không chính xác.</p><br><a href='/' style='color:#38bdf8;'>Quay lại trang chủ</a></div>";
        }
    </script>
    
    <div id="adminContent">
        <div class="container">
            <div class="header-flex">
                <a href="/" class="btn-home">⬅ Quay lại Sàn Giao Dịch</a>
                <h1>🛡️ BẢNG ĐIỀU KHIỂN DATABASE MYSQL</h1>
                <div style="width: 200px;"></div> 
            </div>
            
            <p style="text-align: center; color: #94a3b8;">Dữ liệu được truy xuất theo thời gian thực từ máy chủ Backend và MySQL</p>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Người Chơi</th>
                        <th>Tài Sản</th>
                        <th>Loại Lệnh</th>
                        <th>Tiền Cọc</th>
                        <th>Đòn Bẩy</th>
                        <th>Giá Vào</th>
                        <th>Giá Chốt</th>
                        <th>Lãi/Lỗ ($)</th>
                        <th>Thời Gian</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                    <tr><td colspan="10" style="text-align: center; padding: 30px;">⏳ Đang kéo dữ liệu từ Database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Tách hàm load data ra để chỉ gọi khi nhập đúng pass
        function loadAdminData() {
            fetch('/api/admin/data')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('dataTable');
                    
                    if (data.error) {
                        tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color: #ef4444;">❌ Lỗi: ${data.error}</td></tr>`;
                        return;
                    }
                    
                    if (data.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color: #94a3b8;">Chưa có ai giao dịch trên sàn này.</td></tr>`;
                        return;
                    }

                    tbody.innerHTML = data.map(row => {
                        let pnlClass = row.pnl >= 0 ? 'up' : 'down';
                        let pnlSign = row.pnl >= 0 ? '+' : '';
                        let typeClass = row.trade_type === 'LONG' ? 'up' : 'down';
                        let date = new Date(row.closed_at).toLocaleString('vi-VN');
                        
                        return `
                            <tr>
                                <td style="color: #64748b;">#${row.id}</td>
                                <td><span class="badge">${row.username}</span></td>
                                <td>${row.asset}</td>
                                <td class="${typeClass}">${row.trade_type}</td>
                                <td>$${parseFloat(row.margin).toFixed(2)}</td>
                                <td>${row.leverage}x</td>
                                <td>$${parseFloat(row.entry_price).toFixed(2)}</td>
                                <td>$${parseFloat(row.close_price).toFixed(2)}</td>
                                <td class="${pnlClass}">${pnlSign}$${parseFloat(row.pnl).toFixed(2)}</td>
                                <td style="color: #94a3b8; font-size: 13px;">${date}</td>
                            </tr>
                        `;
                    }).join('');
                })
                .catch(err => {
                    const tbody = document.getElementById('dataTable');
                    if(tbody) tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; color: #ef4444;">❌ Không thể kết nối tới máy chủ.</td></tr>`;
                });
        }
    </script>
</body>
</html>
