version: '3.8'

services:
  load_balancer:
    build: ./nginx
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - web_backend_1
      - web_backend_2
      - web_backend_3

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ued_trading
      MYSQL_USER: ued_user
      MYSQL_PASSWORD: ued_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  web_backend_1:
    build: .
    container_name: metal-gold-ticker-web_backend_1
    environment:
      CONTAINER_NAME: "May_Chu_So_1"
    networks:
      - app_network
    depends_on:
      - db

  web_backend_2:
    build: .
    container_name: metal-gold-ticker-web_backend_2
    environment:
      CONTAINER_NAME: "May_Chu_So_2"
    networks:
      - app_network
    depends_on:
      - db

  web_backend_3:
    build: .
    container_name: metal-gold-ticker-web_backend_3
    environment:
      CONTAINER_NAME: "May_Chu_So_3"
    networks:
      - app_network
    depends_on:
      - db

  # ĐƯA PHPMYADMIN VÀO ĐÂY NÈ ĐẠI CA (Dưới cấp của services)
  phpmyadmin:
    image: phpmyadmin
    container_name: metal-gold-ticker-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data: