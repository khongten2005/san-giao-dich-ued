version: '3.8'

services:
  load_balancer:
    build: ./nginx
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - web_backend_1
      - web_backend_2
      - web_backend_3

  # ĐÂY LÀ CON MYSQL TRÙM CUỐI
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ued_trading
      MYSQL_USER: ued_user
      MYSQL_PASSWORD: ued_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  web_backend_1:
    image: minhtrimtp789/metal-gold-api:latest
    volumes:
      - .:/usr/src/app
    environment:
      CONTAINER_NAME: "May_Chu_So_1"
    networks:
      - app_network
    depends_on:
      - db

  web_backend_2:
    image: minhtrimtp789/metal-gold-api:latest
    volumes:
      - .:/usr/src/app
    environment:
      CONTAINER_NAME: "May_Chu_So_2"
    networks:
      - app_network
    depends_on:
      - db

  web_backend_3:
    image: minhtrimtp789/metal-gold-api:latest
    volumes:
      - .:/usr/src/app
    environment:
      CONTAINER_NAME: "May_Chu_So_3"
    networks:
      - app_network
    depends_on:
      - db

networks:
  app_network:
    driver: bridge

# Khởi tạo ổ cứng ảo lưu dữ liệu vĩnh viễn
volumes:
  db_data: