<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siêu Sàn Giao Dịch UED (V2 Pro)</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; overflow-x: hidden;}
        .dashboard { background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 100%; max-width: 1200px; position: relative; }
        .live-indicator { position: absolute; top: 20px; right: 20px; color: #ef4444; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .top-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        .logo-title { color: #facc15; font-size: 24px; font-weight: bold; margin: 0; }
        
        /* DROPDOWN MENU USER */
        .user-profile { position: relative; cursor: pointer; background: #0f172a; padding: 8px 15px; border-radius: 20px; border: 1px solid #38bdf8; display: none; align-items: center; gap: 10px; transition: 0.2s;}
        .user-profile:hover { background: #1e293b; }
        .user-name { color: #38bdf8; font-weight: bold; font-size: 14px;}
        
        .dropdown-menu { display: none; position: absolute; top: 120%; right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 220px; flex-direction: column; z-index: 100; overflow: hidden; }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 12px 15px; color: white; text-decoration: none; border-bottom: 1px solid #334155; font-size: 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s;}
        .dropdown-item:hover { background: #334155; }
        .dropdown-item:last-child { border-bottom: none; color: #ef4444; font-weight: bold;}
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 15, 25, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #38bdf8; text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: none; outline: none; box-sizing: border-box; text-align: center; font-size: 16px; font-weight: bold;}
        .login-box button { background: #38bdf8; color: #0f172a; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer;}

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 10px; color: white; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: translateX(120%); transition: transform 0.3s ease; display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #10b981; border-left: 5px solid #059669; }
        .toast.error { background: #ef4444; border-left: 5px solid #dc2626; }

        .control-panel { display: flex; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; gap: 20px;}
        .btn-group { display: flex; gap: 10px; }
        button { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #475569; }
        button.active { background: #38bdf8; color: #0f172a; }

        .main-layout { display: flex; gap: 20px; align-items: stretch; flex-wrap: wrap; }
        .left-col { flex: 2; display: flex; flex-direction: column; min-width: 600px;}
        .right-col { flex: 1; background: #0f172a; padding: 20px; border-radius: 15px; border: 1px solid #334155; display: flex; flex-direction: column; min-width: 300px;}

        .price-box { background: #0f172a; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #334155;}
        .price { font-size: 45px; font-weight: bold; transition: 0.3s; }
        .up { color: #10b981; } .down { color: #ef4444; } .neutral { color: #e2e8f0; } 
        #title-display { text-align: center; font-size: 16px; color: #94a3b8; margin-bottom: 20px; }
        
        #chart-container { width: 100%; height: 450px; margin-top: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #334155; }
        
        .balance-title { color: #94a3b8; font-size: 14px; text-align: center; }
        .balance-amount { font-size: 30px; color: #facc15; text-align: center; font-weight: bold; margin-bottom: 5px; }
        .btn-reset { width: 100%; background: transparent; color: #64748b; border: 1px dashed #64748b; padding: 5px; margin-bottom: 15px;}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #cbd5e1; font-size: 13px; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 5px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .sltp-group { display: flex; gap: 10px; }
        .sltp-group input { font-size: 14px; }

        .action-panel { display: flex; gap: 10px; margin-top: 10px; }
        .btn-buy { flex: 1; background: #10b981; font-size: 16px; padding: 12px; }
        .btn-sell { flex: 1; background: #ef4444; font-size: 16px; padding: 12px; }

        .btn-export { background: #8b5cf6; width: 100%; margin-top: 15px; padding: 12px; font-size: 14px; }
        
        .positions-list { flex: 1; overflow-y: auto; margin-top: 10px; max-height: 200px; }
        .pos-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; position: relative; border-left: 4px solid gray; }
        .pos-item.pos-long { border-left-color: #10b981; }
        .pos-item.pos-short { border-left-color: #ef4444; }
        .pos-close { position: absolute; top: 10px; right: 10px; background: transparent; border: 1px solid #64748b; padding: 3px 8px; font-size: 11px; cursor: pointer; color: white; border-radius: 4px; }
        
        .server-info { margin-top: 20px; text-align: center; font-size: 12px; color: #64748b; width: 100%; }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 style="color: #38bdf8; margin-top: 0;">🚀 HỆ THỐNG GIAO DỊCH UED</h2>
            <p style="color: #94a3b8; font-size: 14px;">Vui lòng nhập định danh để bắt đầu</p>
            <input type="text" id="usernameInput" value="minh tri - 3120223215">
            <button onclick="handleLogin()">VÀO SÀN GIAO DỊCH</button>
        </div>
    </div>

    <div id="toast-container"></div>

    <div class="dashboard">
        <div class="live-indicator">● LIVE</div>
        
        <div class="top-header">
            <h1 class="logo-title">📊 SIÊU SÀN UED (V2)</h1>
            
            <div class="user-profile" id="userProfile" onclick="toggleDropdown(event)">
                <span class="user-name">👤 <span id="displayUsername">Khách</span></span>
                <span style="color: #94a3b8; font-size: 12px;">▼</span>
                
                <div class="dropdown-menu" id="userDropdown">
                    <div class="dropdown-item" style="cursor: default; background: #0f172a;">
                        <small style="color: #94a3b8;">🕒 Đăng nhập lúc:<br><b id="loginTimeDisplay" style="color: white;">...</b></small>
                    </div>
                    <div class="dropdown-item" onclick="exportToCSV()">⬇ Xuất CSV Giao Dịch</div>
                    <div class="dropdown-item" onclick="handleLogout()">🚪 Đăng Xuất</div>
                </div>
            </div>
        </div>

        <div id="title-display">Đang giao dịch: <b id="asset-name" style="color:white;">VÀNG (PAXG/USDT)</b></div>
        
        <div class="control-panel">
            <div class="btn-group" id="symbol-btns">
                <button class="active" onclick="changeSymbol('PAXGUSDT', 'VÀNG (PAXG/USDT)')">VÀNG</button>
                <button onclick="changeSymbol('BTCUSDT', 'BITCOIN (BTC/USDT)')">BITCOIN</button>
            </div>
            <div class="btn-group" id="interval-btns">
                <button class="active" onclick="changeInterval('15m')">15 Phút</button>
                <button onclick="changeInterval('1h')">1 Giờ</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="left-col">
                <div class="price-box"><div class="price neutral" id="priceDisplay">Đang tải...</div></div>
                <div id="chart-container"></div>
            </div>

            <div class="right-col">
                <div class="balance-title">Tài khoản Demo (USD)</div>
                <div class="balance-amount" id="balanceDisplay">$0.00</div>
                <button class="btn-reset" onclick="resetAccount()">🔄 Bơm lại $10,000</button>

                <div class="sltp-group">
                    <div class="form-group" style="flex: 1;"><label>Cọc (Margin):</label><input type="number" id="tradeMargin" value="100" min="10"></div>
                    <div class="form-group" style="flex: 1;"><label>Đòn bẩy:</label><select id="tradeLeverage"><option value="10">10x</option><option value="50" selected>50x</option></select></div>
                </div>

                <div class="sltp-group">
                    <div class="form-group" style="flex: 1;"><label>Cắt lỗ (SL):</label><input type="number" id="tradeSL" placeholder="Trống"></div>
                    <div class="form-group" style="flex: 1;"><label>Chốt lời (TP):</label><input type="number" id="tradeTP" placeholder="Trống"></div>
                </div>

                <div class="action-panel">
                    <button class="btn-buy" onclick="executeTrade('LONG')">▲ MUA</button>
                    <button class="btn-sell" onclick="executeTrade('SHORT')">▼ BÁN</button>
                </div>

                <div class="positions-list" id="positionsList"></div>
                <button class="btn-export" onclick="exportToCSV()">⬇ Xuất Excel Báo Cáo</button>
            </div>
        </div>

        <div class="server-info">Load Balancer: <span id="serverName" style="color: #38bdf8;">Đang kết nối...</span></div>
    </div>

    <script src="/main.js"></script>
</body>
</html>
