<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Giao Dịch Của Bạn</title>
    <style>
        /* Dùng lại style cũ cho nhanh đại ca nhé */
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0f19; color: white; padding: 30px; }
        .container { background: #1e293b; padding: 25px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        .up { color: #10b981; } .down { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📜 LỊCH SỬ GIAO DỊCH CỦA BẠN</h1>
        <p id="userWelcome">Đang tải lịch sử...</p>
        <table>
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Loại</th>
                    <th>Vào giá</th>
                    <th>Chốt giá</th>
                    <th>Lãi/Lỗ</th>
                    <th>Thời gian</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
        <br>
        <a href="/" style="color: #38bdf8;">⬅ Quay lại sàn</a>
    </div>

    <script>
        // Lấy username từ LocalStorage (đại ca đã lưu lúc đăng nhập)
        const currentUser = localStorage.getItem('username'); 
        
        if(!currentUser) {
            alert("Vui lòng đăng nhập trước!");
            window.location.href = "/";
        }

        document.getElementById('userWelcome').innerText = "Tài khoản: " + currentUser;

        fetch(`/api/my-history?username=${currentUser}`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('historyTable');
                tbody.innerHTML = data.map(row => `
                    <tr>
                        <td>${row.asset}</td>
                        <td class="${row.trade_type === 'LONG' ? 'up' : 'down'}">${row.trade_type}</td>
                        <td>$${row.entry_price}</td>
                        <td>$${row.close_price}</td>
                        <td class="${row.pnl >= 0 ? 'up' : 'down'}">${row.pnl >= 0 ? '+' : ''}$${row.pnl}</td>
                        <td>${new Date(row.closed_at).toLocaleString('vi-VN')}</td>
                    </tr>
                `).join('');
            });
    </script>
</body>
</html>
